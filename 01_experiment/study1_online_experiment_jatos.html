    <!--
    ==========================================================================
    Study 1 — online experiment (7-outcome lottery task)
    ==========================================================================
    Aim:      The browser-based experiment that collected Study 1 (the
              "number of outcomes" complexity manipulation: a 7-outcome vs. a
              2-outcome lottery). Built with jsPsych 7.3.3 and deployed through
              the JATOS server. This is the data-collection stage; its output
              feeds the analysis pipeline (../data/final_df_study1.rds).

    Framework: jsPsych 7.3.3 (+ jQuery). JATOS integration via `jatos.js`
              (addAbortButton, submitResultData, endStudy). Trial data are
              submitted to JATOS as CSV at the end.

    Timeline (defined below, in order):
      1. Preload of all lottery/instruction images.
      2. Browser check + fullscreen + consent.
      3. Instructions and worked examples (7-outcome and 2-outcome lotteries,
         outcome/probability/bonus explanation).
      4. Comprehension quizzes — each loops until the participant answers
         correctly (correctResponseIndex / incorrectLoop logic).
      5. Main lottery-choice trials: CS trials (complex vs. simple option) and
         CCSS trials (both complex or both simple), with per-trial feedback and
         reaction-time recording; blocks separated by break messages.
      6. Post-task questionnaires and cognitive-ability items.
      7. Debrief, then data submission to JATOS.

    Assets NOT bundled here (they live in the JATOS study-assets folder next to
    this file): `jatos.js`; the local plugins under `dist/`; and the image
    stimuli under `ques_prac/` and the main-trial image folders. Import this
    file together with those assets as a JATOS study to run it.

    Part of the complexity-under-risk replication package (experiment /
    data-collection stage). See ../README.md. Studies 2 and 3 use essentially
    the same experiment code — only the stimuli (lottery displays) differ
    (arithmetic-expression and compound-probability manipulations) — so they are
    not reproduced separately; this file documents the construction for all three.
    ==========================================================================
    -->
